name: dental_clinic_app
description: A production-level Smart Dental Clinic Management App with clean architecture.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0

  # Navigation
  go_router: ^13.0.0

  # UI & Charts
  fl_chart: ^0.64.0
  table_calendar: ^3.0.9

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  cupertino_icons: ^1.0.8
  
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
